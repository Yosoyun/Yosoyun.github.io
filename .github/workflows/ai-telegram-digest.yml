name: AI Telegram Digest

on:
  workflow_dispatch:
  schedule:
    # 08:00, 14:00, and 20:00 Asia/Kolkata.
    - cron: "30 2,8,14 * * *"

permissions:
  contents: read

concurrency:
  group: ai-telegram-digest
  cancel-in-progress: false

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Send Telegram digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AI_DIGEST_DRY_RUN: "0"
        run: python3 ai-intel-bot/telegram_digest.py --fresh-hours 10
